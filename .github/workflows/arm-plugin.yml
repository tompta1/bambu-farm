name: arm-plugin

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            libboost-all-dev \
            libprotobuf-dev \
            libssl-dev \
            protobuf-compiler

      - name: Build ARM plugin artifacts
        run: |
          chmod +x bambu-farm-client/install-flatpak-plugin.sh
          chmod +x bambu-farm-client/package-release.sh
          make -C bambu-farm-client test-helpers
          cargo test --manifest-path bambu-farm-server/Cargo.toml
          make -C bambu-farm-client shared
          ./bambu-farm-client/package-release.sh

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: bambu-farm-oss-network-plugin-linux-aarch64
          path: bambu-farm-client/dist/*.tar.gz
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write
    steps:
      - name: Download packaged artifact
        uses: actions/download-artifact@v4
        with:
          name: bambu-farm-oss-network-plugin-linux-aarch64
          path: dist

      - name: Publish GitHub release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" dist/*.tar.gz --clobber
          else
            gh release create "${GITHUB_REF_NAME}" dist/*.tar.gz \
              --title "${GITHUB_REF_NAME}" \
              --generate-notes
          fi
